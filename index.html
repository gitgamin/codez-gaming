<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Codez UBG</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="icon active"
onclick="showSection('home')">

<i class="fas fa-house"></i>

</div>

<div class="icon"
onclick="showSection('games')">

<i class="fas fa-gamepad"></i>

</div>

<div class="icon"
onclick="showSection('apps')">

<i class="fas fa-table-cells"></i>

</div>

<div class="icon"
onclick="showSection('chat')">

<i class="fas fa-message"></i>

</div>

<div class="icon"
onclick="showSection('search')">

<i class="fas fa-magnifying-glass"></i>

</div>

<div class="icon"
onclick="showSection('images')">

<i class="fas fa-image"></i>

</div>

<div class="icon"
onclick="showSection('add')">

<i class="fas fa-plus"></i>

</div>

<div class="bottom-icons">

<div class="icon"
onclick="window.open('https://discord.com','_blank')">

<i class="fab fa-discord"></i>

</div>

<div class="icon"
onclick="showSection('files')">

<i class="fas fa-file"></i>

</div>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- HOME -->

<section id="home" class="section">

<div class="logo"></div>

<h1>Codez UBG</h1>

<p class="subtitle">
Ultimate game hub
</p>

<div class="buttons">

<button>
Export Save
</button>

<button>
Import Save
</button>

</div>

</section>

<!-- GAMES -->

<section id="games"
class="section hidden">

<h1>Games</h1>

<div class="game-grid">

<div class="game-card">
Cookie Clicker
</div>

<div class="game-card">
Run 3
</div>

<div class="game-card">
2048
</div>

<div class="game-card">
Slope
</div>

</div>

</section>

<!-- APPS -->

<section id="apps"
class="section hidden">

<h1>Apps</h1>

<p>
Apps section here
</p>

</section>

<!-- CHAT -->

<section id="chat"
class="section hidden">

<h1>Community</h1>

<p>
Chat section here
</p>

</section>

<!-- SEARCH -->

<section id="search"
class="section hidden">

<h1>Search</h1>

<input type="text"
placeholder="Search games..."
class="search-box">

</section>

<!-- IMAGES -->

<section id="images"
class="section hidden">

<h1>Wallpapers</h1>

<p>
Images section here
</p>

</section>

<!-- ADD -->

<section id="add"
class="section hidden">

<h1>Add Game</h1>

<input class="search-box"
placeholder="Game Name">

<br><br>

<input class="search-box"
placeholder="Game URL">

<br><br>

<button>
Add Game
</button>

</section>

<!-- FILES -->

<section id="files"
class="section hidden">

<h1>Files</h1>

<p>
Your files appear here
</p>

</section>

</div>

<!-- CLOCK -->

<div class="clock-box">

<div id="clock"></div>

<div class="date">
SYSTEM
</div>

</div>

<script src="script.js"></script>

</body>
</html>
