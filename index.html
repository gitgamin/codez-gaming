<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codez UBG</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="icon"><i class="fas fa-house"></i></div>
  <div class="icon"><i class="fas fa-gamepad"></i></div>
  <div class="icon"><i class="fas fa-table-cells"></i></div>
  <div class="icon"><i class="fas fa-message"></i></div>
  <div class="icon"><i class="fas fa-magnifying-glass"></i></div>
  <div class="icon"><i class="fas fa-image"></i></div>
  <div class="icon"><i class="fas fa-plus"></i></div>

  <div class="bottom-icons">
    <div class="icon"><i class="fab fa-discord"></i></div>
    <div class="icon"><i class="fas fa-file"></i></div>
  </div>

</div>

<!-- MAIN -->
<div class="main">

<div class="logo"></div>

<h1>Codez UBG</h1>

<p class="subtitle">
The ultimate game site to play games!
</p>

<p class="subtitle2">
Hundreds of games added!
</p>

<div class="buttons">
<button>Export Save</button>
<button>Import Save</button>
</div>

<div class="counter">
<h2>Views:</h2>
<div class="digits" id="views">00000314499</div>

<h2>Players:</h2>
<div class="digits" id="players">00000106397</div>
</div>

<div class="footer">
By using this site you agree to Terms & Privacy Policy
</div>

</div>

<!-- CLOCK -->
<div class="clock-box">
<div id="clock"></div>
<div class="date">SYSTEM</div>
</div>

<script src="script.js"></script>

</body>
</html>
